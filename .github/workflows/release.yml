name: Auto tag and release selected files

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag_and_release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Bump version and push tag
        id: tag
        uses: anothrNick/github-tag-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch
          RELEASE_BRANCHES: main

      - name: Prepare release package
        run: |
          mkdir -p release
          cp -r extensions data release/
          cp *.tox release/
          cp setup.sh setup.bat Examples.toe release/
          cd release
          zip -r ../PyEyesWeb_${{ steps.tag.outputs.new_tag }}.zip .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: Release ${{ steps.tag.outputs.new_tag }}
          files: PyEyesWeb_${{ steps.tag.outputs.new_tag }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
